# PlantDiary nginx reverse proxy.
# NOT ACTIVE on ds9: the host has no nginx and no passwordless sudo; routing is
# done by the existing Traefik (see docker-compose.yml). Kept for a future
# standalone deployment per the original spec.
server {
    listen 80;
    server_name plantdiary.local;

    client_max_body_size 15M;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        root /home/piotrek/srv/rpi-backup/private/plantdiary/frontend;
        try_files $uri $uri/ /index.html;
    }
}
