      - generic [ref=e81]:
        - heading "Opis" [level=2] [ref=e82]
        - paragraph [ref=e83]: Pomidor wielkoowocowy (typu 'beefsteak') to ciepłolubna roślina psiankowata o ogromnych, mięsistych owocach ważących nawet 300-600 g. Większość odmian to typy wysokie (indeterminate), które rosną w nieskończoność i wymagają palikowania oraz usuwania bocznych pędów. Uprawiany dla niezrównanego smaku świeżych owoców do sałatek i kanapek; w Polsce najlepiej udaje się pod osłonami lub w ciepłych, osłoniętych miejscach.
      - generic [ref=e84]:
        - heading "Przewodnik pielęgnacji" [level=2] [ref=e85]
        - generic [ref=e86]:
          - generic [ref=e87]:
            - paragraph [ref=e88]:
              - img [ref=e89]
              - text: Światło
            - paragraph [ref=e95]: Pełne słońce, minimum 6-8 godzin dziennie. Najlepsze stanowisko to ciepłe, osłonięte od wiatru miejsce przy południowej ścianie lub w tunelu/szklarni.
          - generic [ref=e96]:
            - paragraph [ref=e97]:
              - img [ref=e98]
              - text: Gleba
            - paragraph [ref=e100]: Żyzna, próchniczna, głęboka gleba o pH 6,0-6,8, dobrze przepuszczalna lecz zatrzymująca wilgoć. Nie uprawiaj po innych psiankowatych (ziemniak, papryka) przez 3-4 lata.
          - generic [ref=e101]:
            - paragraph [ref=e102]:
              - img [ref=e103]
              - text: Podlewanie
            - paragraph [ref=e105]: Podlewaj regularnie i głęboko, najlepiej co 2-3 dni, zawsze pod korzeń, nigdy na liście (mokre liście sprzyjają zarazie). W upały i pod osłonami nawet codziennie. Nierównomierne podlewanie powoduje pękanie owoców i suchą zgniliznę wierzchołkową; więdnące liście w dzień przy suchej glebie to objaw niedoboru wody.
          - generic [ref=e106]:
            - paragraph [ref=e107]:
              - img [ref=e108]
              - text: Nawożenie
            - paragraph [ref=e117]: Przed sadzeniem wzbogać glebę kompostem lub obornikiem. Od zawiązania pierwszych owoców (czerwiec) podawaj co 10-14 dni nawóz bogaty w potas, np. specjalistyczny nawóz do pomidorów NPK ok. 4-6-8 lub gnojówkę z żywokostu. Unikaj nadmiaru azotu, który daje bujne liście kosztem owoców.
          - generic [ref=e118]:
            - paragraph [ref=e119]:
              - img [ref=e120]
              - text: Przycinanie
            - paragraph [ref=e126]: Odmiany wysokie prowadź na 1-2 pędy, regularnie wyłamując wszystkie wilki (pędy boczne) wyrastające w kątach liści. Na początku sierpnia uszczypnij wierzchołek nad ostatnim gronem, aby owoce zdążyły dojrzeć.
          - generic [ref=e127]:
            - paragraph [ref=e128]:
              - img [ref=e129]
              - text: Rozmnażanie
            - paragraph [ref=e132]: Z nasion wysiewanych w marcu-kwietniu do skrzynek w temperaturze 22-25°C; pikuj i hartuj przed wysadzeniem po 15 maja. Można też ukorzeniać wyłamane wilki w wodzie.
          - generic [ref=e133]:
            - paragraph [ref=e134]:
              - img [ref=e135]
              - text: Zbiór
            - paragraph [ref=e144]: Zbieraj od lipca do października, gdy owoce w pełni się wybarwią, lecz są jeszcze jędrne. Najlepszy smak mają zerwane dojrzałe; pod koniec sezonu zielone owoce dojrzewają w domu w cieple obok jabłka.
          - generic [ref=e145]:
            - paragraph [ref=e146]:
              - img [ref=e147]
              - text: Zimowanie
            - paragraph [ref=e160]: Roślina jednoroczna, nie zimuje. Po pierwszych przymrozkach usuń rośliny; nie kompostuj liści porażonych zarazą.
