      - generic [ref=e55]:
        - heading "Opis" [level=2] [ref=e56]
        - paragraph [ref=e57]: Pomidor wielkoowocowy (typu 'beefsteak') to ciepłolubna roślina psiankowata o ogromnych, mięsistych owocach ważących nawet 300-600 g. Większość odmian to typy wysokie (indeterminate), które rosną w nieskończoność i wymagają palikowania oraz usuwania bocznych pędów. Uprawiany dla niezrównanego smaku świeżych owoców do sałatek i kanapek; w Polsce najlepiej udaje się pod osłonami lub w ciepłych, osłoniętych miejscach.
      - generic [ref=e58]:
        - heading "Przewodnik pielęgnacji" [level=2] [ref=e59]
        - generic [ref=e60]:
          - generic [ref=e61]:
            - paragraph [ref=e62]:
              - generic [ref=e63]: 🔆
              - text: Światło
            - paragraph [ref=e64]: Pełne słońce, minimum 6-8 godzin dziennie. Najlepsze stanowisko to ciepłe, osłonięte od wiatru miejsce przy południowej ścianie lub w tunelu/szklarni.
          - generic [ref=e65]:
            - paragraph [ref=e66]:
              - generic [ref=e67]: 🪨
              - text: Gleba
            - paragraph [ref=e68]: Żyzna, próchniczna, głęboka gleba o pH 6,0-6,8, dobrze przepuszczalna lecz zatrzymująca wilgoć. Nie uprawiaj po innych psiankowatych (ziemniak, papryka) przez 3-4 lata.
          - generic [ref=e69]:
            - paragraph [ref=e70]:
              - generic [ref=e71]: 💧
              - text: Podlewanie
            - paragraph [ref=e72]: Podlewaj regularnie i głęboko, najlepiej co 2-3 dni, zawsze pod korzeń, nigdy na liście (mokre liście sprzyjają zarazie). W upały i pod osłonami nawet codziennie. Nierównomierne podlewanie powoduje pękanie owoców i suchą zgniliznę wierzchołkową; więdnące liście w dzień przy suchej glebie to objaw niedoboru wody.
          - generic [ref=e73]:
            - paragraph [ref=e74]:
              - generic [ref=e75]: 🌾
              - text: Nawożenie
            - paragraph [ref=e76]: Przed sadzeniem wzbogać glebę kompostem lub obornikiem. Od zawiązania pierwszych owoców (czerwiec) podawaj co 10-14 dni nawóz bogaty w potas, np. specjalistyczny nawóz do pomidorów NPK ok. 4-6-8 lub gnojówkę z żywokostu. Unikaj nadmiaru azotu, który daje bujne liście kosztem owoców.
          - generic [ref=e77]:
            - paragraph [ref=e78]:
              - generic [ref=e79]: ✂️
              - text: Przycinanie
            - paragraph [ref=e80]: Odmiany wysokie prowadź na 1-2 pędy, regularnie wyłamując wszystkie wilki (pędy boczne) wyrastające w kątach liści. Na początku sierpnia uszczypnij wierzchołek nad ostatnim gronem, aby owoce zdążyły dojrzeć.
          - generic [ref=e81]:
            - paragraph [ref=e82]:
              - generic [ref=e83]: 🌱
              - text: Rozmnażanie
            - paragraph [ref=e84]: Z nasion wysiewanych w marcu-kwietniu do skrzynek w temperaturze 22-25°C; pikuj i hartuj przed wysadzeniem po 15 maja. Można też ukorzeniać wyłamane wilki w wodzie.
          - generic [ref=e85]:
            - paragraph [ref=e86]:
              - generic [ref=e87]: 🧺
              - text: Zbiór
            - paragraph [ref=e88]: Zbieraj od lipca do października, gdy owoce w pełni się wybarwią, lecz są jeszcze jędrne. Najlepszy smak mają zerwane dojrzałe; pod koniec sezonu zielone owoce dojrzewają w domu w cieple obok jabłka.
          - generic [ref=e89]:
            - paragraph [ref=e90]:
              - generic [ref=e91]: ❄️
              - text: Zimowanie
            - paragraph [ref=e92]: Roślina jednoroczna, nie zimuje. Po pierwszych przymrozkach usuń rośliny; nie kompostuj liści porażonych zarazą.
